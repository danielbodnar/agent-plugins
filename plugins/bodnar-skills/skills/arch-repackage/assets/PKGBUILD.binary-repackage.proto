# Maintainer: arch-repackage <nobody@localhost>
#
# Binary repackage generated by arch-repackage.
# Origin: %ORIGIN%
#
# CAVEAT: this package ships the installed BYTES of the source system verbatim.
# It carries no build provenance and is not reproducible from source. The
# payload tarball was cut directly from the analysed root with bsdtar,
# preserving mode, ownership, mtime, xattrs and file capabilities.
#
# Use this strategy for fidelity (migration, forensic rebuilds, air-gapped
# mirrors). For a maintainable package, convert it to a source rebuild.

pkgname=%PKGNAME%
pkgver=%PKGVER%
pkgrel=%PKGREL%
%EPOCH%
pkgdesc="%PKGDESC%"
arch=(%ARCH%)
url="%URL%"
license=(%LICENSE%)
depends=(%DEPENDS%)
options=('!strip' '!debug' 'emptydirs')
%INSTALL%
source=("%PAYLOAD%")
b2sums=('%B2SUM%')

package() {
  # Unpack the verbatim payload into the package root. -p preserves
  # permissions; bsdtar restores xattrs and capabilities recorded at cut time.
  bsdtar -x -p -f "$srcdir/%PAYLOAD%" -C "$pkgdir"
}
