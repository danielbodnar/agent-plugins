<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stars · Workbench</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Inter:wght@400;450;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<script>
  (function() {
    try {
      var saved = localStorage.getItem('theme');
      if (saved === 'light' || saved === 'dark') {
        document.documentElement.setAttribute('data-theme', saved);
      }
      var ui = localStorage.getItem('stars.ui');
      if (ui) {
        var p = JSON.parse(ui);
        if (p.sidebarW) document.documentElement.style.setProperty('--sidebar-w', p.sidebarW + 'rem');
        if (p.detailW) document.documentElement.style.setProperty('--detail-w', p.detailW + 'rem');
      }
    } catch (e) {}
  })();
</script>
<style>
  :root {
    color-scheme: light dark;
    --font-display: 'Inter Tight', system-ui, sans-serif;
    --font-body: 'Inter', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    --text-xs: 0.75rem;
    --text-sm: 0.8125rem;
    --text-base: 0.9375rem;
    --text-lg: 1.0625rem;
    --text-xl: 1.25rem;
    --text-2xl: 1.625rem;
    --text-3xl: 2.125rem;

    --color-paper: oklch(99% 0 0);
    --color-paper-2: oklch(96.8% 0 0);
    --color-paper-3: oklch(94% 0.003 240);
    --color-paper-4: oklch(91% 0.005 240);
    --color-ink: oklch(17% 0.012 240);
    --color-ink-2: oklch(36% 0.008 240);
    --color-ink-3: oklch(54% 0.005 240);
    --color-ink-4: oklch(70% 0.004 240);
    --color-rule: oklch(89% 0.003 240);
    --color-rule-2: oklch(82% 0.005 240);
    --color-accent: oklch(52% 0.17 244);
    --color-accent-2: oklch(60% 0.16 244);
    --color-accent-bg: oklch(96% 0.025 244);
    --color-accent-bg-strong: oklch(92% 0.04 244);
    --color-success: oklch(56% 0.14 148);
    --color-warning: oklch(70% 0.16 75);
    --color-danger: oklch(55% 0.18 25);
    --color-focus: oklch(52% 0.17 244);
    --color-row-hover: oklch(96.8% 0 0);
    --color-row-selected: oklch(94% 0.025 244);
    --color-row-selected-rule: oklch(82% 0.06 244);
    --shadow-sm: 0 1px 2px oklch(0% 0 0 / 0.04);
    --shadow: 0 1px 2px oklch(0% 0 0 / 0.04), 0 8px 24px oklch(0% 0 0 / 0.06);
    --shadow-lg: 0 1px 2px oklch(0% 0 0 / 0.04), 0 16px 48px oklch(0% 0 0 / 0.08);

    --space-1: 0.25rem;
    --space-2: 0.5rem;
    --space-3: 0.75rem;
    --space-4: 1rem;
    --space-5: 1.5rem;
    --space-6: 2rem;
    --space-7: 3rem;
    --space-8: 4.5rem;
    --radius-sm: 0.25rem;
    --radius-md: 0.5rem;
    --radius-lg: 0.75rem;
    --radius-pill: 62.4375rem;
    --hairline: 1px solid var(--color-rule);
    --hairline-strong: 1px solid var(--color-rule-2);
    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    --duration-fast: 120ms;
    --duration: 200ms;
    --topbar-h: 3.5rem;
    --sidebar-w: 17.5rem;
    --detail-w: 25rem;
    --list-w: 23.75rem;
  }

  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --color-paper: oklch(13% 0.008 240);
      --color-paper-2: oklch(16% 0.01 240);
      --color-paper-3: oklch(20% 0.012 240);
      --color-paper-4: oklch(25% 0.012 240);
      --color-ink: oklch(95% 0.005 240);
      --color-ink-2: oklch(76% 0.005 240);
      --color-ink-3: oklch(58% 0.008 240);
      --color-ink-4: oklch(42% 0.008 240);
      --color-rule: oklch(26% 0.012 240);
      --color-rule-2: oklch(34% 0.012 240);
      --color-accent: oklch(72% 0.15 244);
      --color-accent-2: oklch(78% 0.14 244);
      --color-accent-bg: oklch(28% 0.07 244);
      --color-accent-bg-strong: oklch(34% 0.09 244);
      --color-success: oklch(70% 0.14 148);
      --color-warning: oklch(78% 0.16 75);
      --color-danger: oklch(70% 0.16 25);
      --color-focus: oklch(72% 0.15 244);
      --color-row-hover: oklch(18% 0.01 240);
      --color-row-selected: oklch(24% 0.05 244);
      --color-row-selected-rule: oklch(40% 0.08 244);
      --shadow-sm: 0 1px 2px oklch(0% 0 0 / 0.3);
      --shadow: 0 1px 2px oklch(0% 0 0 / 0.3), 0 8px 24px oklch(0% 0 0 / 0.4);
      --shadow-lg: 0 1px 2px oklch(0% 0 0 / 0.3), 0 16px 48px oklch(0% 0 0 / 0.5);
      color-scheme: dark;
    }
  }

  :root[data-theme="dark"] {
    --color-paper: oklch(13% 0.008 240);
    --color-paper-2: oklch(16% 0.01 240);
    --color-paper-3: oklch(20% 0.012 240);
    --color-paper-4: oklch(25% 0.012 240);
    --color-ink: oklch(95% 0.005 240);
    --color-ink-2: oklch(76% 0.005 240);
    --color-ink-3: oklch(58% 0.008 240);
    --color-ink-4: oklch(42% 0.008 240);
    --color-rule: oklch(26% 0.012 240);
    --color-rule-2: oklch(34% 0.012 240);
    --color-accent: oklch(72% 0.15 244);
    --color-accent-2: oklch(78% 0.14 244);
    --color-accent-bg: oklch(28% 0.07 244);
    --color-accent-bg-strong: oklch(34% 0.09 244);
    --color-success: oklch(70% 0.14 148);
    --color-warning: oklch(78% 0.16 75);
    --color-danger: oklch(70% 0.16 25);
    --color-focus: oklch(72% 0.15 244);
    --color-row-hover: oklch(18% 0.01 240);
    --color-row-selected: oklch(24% 0.05 244);
    --color-row-selected-rule: oklch(40% 0.08 244);
    --shadow-sm: 0 1px 2px oklch(0% 0 0 / 0.3);
    --shadow: 0 1px 2px oklch(0% 0 0 / 0.3), 0 8px 24px oklch(0% 0 0 / 0.4);
    --shadow-lg: 0 1px 2px oklch(0% 0 0 / 0.3), 0 16px 48px oklch(0% 0 0 / 0.5);
    color-scheme: dark;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 100%; -webkit-text-size-adjust: 100%; }
  html, body { height: 100%; overflow: hidden; -webkit-font-smoothing: antialiased; }
  body { font-family: var(--font-body); font-size: var(--text-base); line-height: 1.5; color: var(--color-ink); background: var(--color-paper); }
  button { font: inherit; color: inherit; cursor: pointer; background: transparent; border: none; }
  input { font: inherit; color: inherit; }
  ul { list-style: none; }
  a { color: inherit; text-decoration: none; }
  :focus-visible { outline: 2px solid var(--color-focus); outline-offset: 1px; border-radius: var(--radius-sm); }
  ::selection { background: var(--color-accent-bg); color: var(--color-ink); }

  /* App shell */
  .app { display: grid; grid-template-rows: var(--topbar-h) 1fr; height: 100vh; height: 100dvh; }

  /* Topbar */
  .topbar { display: flex; align-items: center; gap: var(--space-3); padding: 0 var(--space-4); border-bottom: var(--hairline); background: var(--color-paper); position: relative; z-index: 20; }
  .brand { display: inline-flex; align-items: center; gap: var(--space-2); padding-right: var(--space-3); font-family: var(--font-display); font-weight: 600; font-size: var(--text-sm); letter-spacing: -0.01em; height: 100%; }
  .brand-glyph { width: 0.875rem; height: 0.875rem; background: var(--color-ink); -webkit-mask: url("data:image/svg+xml,%3Csvg viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M12 2l2.65 7.04 7.35.6-5.6 4.8 1.75 7.16L12 17.8 5.85 21.6l1.75-7.16-5.6-4.8 7.35-.6L12 2z'/%3E%3C/svg%3E") center/contain no-repeat; mask: url("data:image/svg+xml,%3Csvg viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M12 2l2.65 7.04 7.35.6-5.6 4.8 1.75 7.16L12 17.8 5.85 21.6l1.75-7.16-5.6-4.8 7.35-.6L12 2z'/%3E%3C/svg%3E") center/contain no-repeat; }

  /* Sidebar nav (Stars / Discover) */
  .sidebar-nav { padding: var(--space-3); display: flex; flex-direction: column; gap: 0.125rem; border-bottom: var(--hairline); }
  .sidebar-nav-item { display: flex; align-items: center; gap: var(--space-3); padding: var(--space-2) var(--space-3); border-radius: var(--radius-sm); color: var(--color-ink-2); font-size: var(--text-sm); font-weight: 500; cursor: pointer; transition: all var(--duration-fast) var(--ease-out); text-align: left; }
  .sidebar-nav-item:hover { background: var(--color-paper-2); color: var(--color-ink); }
  .sidebar-nav-item.is-active { background: var(--color-accent-bg); color: var(--color-accent); }
  .sidebar-nav-item svg { width: 0.875rem; height: 0.875rem; flex-shrink: 0; }
  .sidebar-nav-item-label { flex: 1; }
  .sidebar-nav-item-count { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--color-ink-3); }
  .sidebar-nav-item.is-active .sidebar-nav-item-count { color: var(--color-accent); }

  .search-wrap { flex: 1; max-width: 45rem; display: flex; align-items: center; gap: var(--space-2); padding: var(--space-2) var(--space-3); background: var(--color-paper-2); border-radius: var(--radius-md); border: 1px solid transparent; transition: all var(--duration) var(--ease-out); }
  .search-wrap:focus-within { background: var(--color-paper); border-color: var(--color-accent); box-shadow: 0 0 0 4px var(--color-accent-bg); }
  .search-icon { width: 0.875rem; height: 0.875rem; color: var(--color-ink-3); flex-shrink: 0; }
  .search-input { flex: 1; border: none; background: transparent; outline: none; font-family: var(--font-mono); font-size: var(--text-sm); min-width: 0; }
  .search-input::placeholder { color: var(--color-ink-3); }
  .search-kbd { font-family: var(--font-mono); font-size: 0.6875rem; color: var(--color-ink-3); padding: 0.125rem var(--space-2); border: 1px solid var(--color-rule); border-radius: var(--radius-sm); background: var(--color-paper); white-space: nowrap; }

  .mode-toggle { display: flex; background: var(--color-paper-2); padding: 0.125rem; border-radius: var(--radius-md); font-family: var(--font-mono); font-size: var(--text-xs); }
  .mode { padding: var(--space-1) var(--space-3); border-radius: var(--radius-sm); color: var(--color-ink-3); transition: all var(--duration-fast) var(--ease-out); white-space: nowrap; }
  .mode.is-active { background: var(--color-paper); color: var(--color-ink); box-shadow: var(--shadow-sm); }
  .mode:hover:not(.is-active) { color: var(--color-ink); }
  .mode-toggle.is-hidden { display: none; }

  .topbar-spacer { flex: 1; }
  .icon-btn { width: 2rem; height: 2rem; display: inline-flex; align-items: center; justify-content: center; border-radius: var(--radius-sm); color: var(--color-ink-2); transition: all var(--duration-fast) var(--ease-out); position: relative; }
  .icon-btn:hover { background: var(--color-paper-2); color: var(--color-ink); }
  .icon-btn svg { width: 1rem; height: 1rem; }
  .icon-btn .icon-sun { display: none; }
  :root[data-theme="dark"] .icon-btn .icon-moon { display: none; }
  :root[data-theme="dark"] .icon-btn .icon-sun { display: block; }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) .icon-btn .icon-moon { display: none; }
    :root:not([data-theme="light"]) .icon-btn .icon-sun { display: block; }
  }

  /* Body grid with resize handles */
  .body { display: grid; grid-template-columns: min(var(--sidebar-w), 75vw) 0.375rem minmax(0, 1fr); min-height: 0; position: relative; }
  .body.has-detail { grid-template-columns: min(var(--sidebar-w), 40vw) 0.375rem min(var(--list-w), 40vw) 0.375rem minmax(0, 1fr); }

  /* Resize handles */
  .resize-handle { background: transparent; cursor: col-resize; position: relative; transition: background var(--duration-fast) var(--ease-out); user-select: none; touch-action: none; z-index: 5; }
  /* The detail resize handle only exists alongside the detail pane. Without this it would
   * sit in flow as a 4th child of a 3-column grid and wrap to a phantom second row. */
  .resize-handle[data-target="detail"] { display: none; }
  .body.has-detail > .resize-handle[data-target="detail"] { display: block; }
  .resize-handle::before { content: ''; position: absolute; top: 0; bottom: 0; left: 50%; transform: translateX(-50%); width: 0.0625rem; background: var(--color-rule); transition: background var(--duration-fast) var(--ease-out), width var(--duration-fast) var(--ease-out); }
  .resize-handle:hover::before, .resize-handle.is-active::before { background: var(--color-accent); width: 0.125rem; }
  .resize-handle.is-active { background: var(--color-accent-bg); }
  body.is-resizing { cursor: col-resize !important; }
  body.is-resizing * { cursor: col-resize !important; user-select: none !important; pointer-events: none !important; }
  body.is-resizing .resize-handle { pointer-events: auto !important; }

  /* Sidebar */
  .sidebar { border-right: none; background: var(--color-paper); overflow-y: auto; overscroll-behavior: contain; }
  .sidebar-section { padding: var(--space-3) var(--space-3); border-bottom: var(--hairline); }
  .sidebar-section:last-child { border-bottom: none; }

  /* Tree */
  .tree { padding: var(--space-2) 0; }
  .tree-node { user-select: none; }
  .tree-node-header { display: flex; align-items: center; gap: 0; padding: 0.25rem var(--space-3); cursor: pointer; transition: background var(--duration-fast) var(--ease-out); border-radius: var(--radius-sm); margin: 0 var(--space-2); position: relative; }
  .tree-node-header:hover { background: var(--color-paper-2); }
  .tree-node-header.is-action { padding-right: 0.375rem; }
  .tree-caret { width: 1rem; height: 1rem; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--color-ink-3); transition: transform var(--duration-fast) var(--ease-out); }
  .tree-caret svg { width: 0.5rem; height: 0.5rem; }
  .tree-node.is-collapsed > .tree-node-header .tree-caret { transform: rotate(-90deg); }
  .tree-node-label { flex: 1; display: flex; align-items: center; gap: var(--space-2); min-width: 0; font-family: var(--font-mono); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--color-ink-3); font-weight: 500; }
  .tree-node-label .tree-icon { width: 0.75rem; height: 0.75rem; color: var(--color-ink-4); flex-shrink: 0; }
  .tree-node-label .tree-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tree-node-count { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--color-ink-4); flex-shrink: 0; }
  .tree-node-action { color: var(--color-ink-3); padding: 0.125rem var(--space-2); border-radius: var(--radius-sm); font-size: var(--text-xs); font-family: var(--font-body); text-transform: none; letter-spacing: 0; opacity: 0; transition: opacity var(--duration-fast) var(--ease-out); }
  .tree-node-header:hover .tree-node-action { opacity: 1; }
  .tree-node-action:hover { background: var(--color-paper-3); color: var(--color-accent); }
  .tree-children { padding-left: 1rem; margin-left: calc(var(--space-3) + 0.4375rem); border-left: 1px solid var(--color-rule); transition: max-height var(--duration) var(--ease-out); position: relative; }
  .tree-node.is-collapsed > .tree-children { display: none; }
  .tree-children .tree-children { margin-left: 0.4375rem; }

  /* Leaf items (collections + facet items) */
  .tree-item { display: flex; align-items: center; gap: var(--space-2); padding: 0.25rem var(--space-3) 0.25rem var(--space-2); margin-right: var(--space-2); border-radius: var(--radius-sm); font-size: var(--text-sm); color: var(--color-ink-2); cursor: pointer; transition: background var(--duration-fast) var(--ease-out); position: relative; }
  .tree-item:hover { background: var(--color-paper-2); color: var(--color-ink); }
  .tree-item.is-active { background: var(--color-accent-bg); color: var(--color-accent); }
  .tree-item-icon { width: 0.75rem; height: 0.75rem; flex-shrink: 0; color: var(--color-ink-4); display: inline-flex; align-items: center; justify-content: center; }
  .tree-item.is-active .tree-item-icon { color: var(--color-accent); }
  .tree-item-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: left; }
  .tree-item-count { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--color-ink-3); flex-shrink: 0; }
  .tree-item.is-active .tree-item-count { color: var(--color-accent); }

  /* Main pane */
  .main { display: flex; flex-direction: column; min-width: 0; min-height: 0; background: var(--color-paper-2); }
  .main > .toolbar, .main > .discover-banner, .main > .nl-hint { flex: 0 0 auto; }
  .toolbar { display: flex; align-items: center; gap: var(--space-3); padding: var(--space-3) var(--space-5); border-bottom: var(--hairline); background: var(--color-paper); min-height: 3.5rem; flex-wrap: wrap; }
  .toolbar-meta { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--color-ink-3); text-transform: uppercase; letter-spacing: 0.06em; }
  .toolbar-meta strong { color: var(--color-ink); font-weight: 500; }
  .chip-row { display: flex; flex-wrap: wrap; gap: var(--space-2); align-items: center; }
  .chip { display: inline-flex; align-items: center; gap: var(--space-1); padding: 0.1875rem var(--space-2); background: var(--color-accent-bg); color: var(--color-accent); border-radius: var(--radius-sm); font-family: var(--font-mono); font-size: var(--text-xs); line-height: 1.4; }
  .chip button { color: var(--color-accent); opacity: 0.6; display: inline-flex; align-items: center; padding: 0; margin-left: 0.125rem; }
  .chip button:hover { opacity: 1; }
  .chip-clear { font-family: var(--font-body); font-size: var(--text-xs); color: var(--color-ink-3); padding: 0.1875rem var(--space-2); border-radius: var(--radius-sm); }
  .chip-clear:hover { color: var(--color-danger); background: var(--color-paper-2); }
  .toolbar-spacer { flex: 1; }

  .select { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--color-ink); background: var(--color-paper-2); border: 1px solid transparent; padding: var(--space-2) var(--space-3); border-radius: var(--radius-sm); appearance: none; -webkit-appearance: none; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 10 10' xmlns='http://www.w3.org/2000/svg' fill='none' stroke='%23888' stroke-width='1.5'%3E%3Cpath d='M2 4l3 3 3-3'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right var(--space-2) center; background-size: 0.5rem; padding-right: var(--space-6); cursor: pointer; }
  .select:focus { border-color: var(--color-accent); outline: none; }
  .view-toggle { display: flex; background: var(--color-paper-2); padding: 0.125rem; border-radius: var(--radius-sm); }
  .view-toggle button { padding: var(--space-1) var(--space-2); border-radius: 0.1875rem; color: var(--color-ink-3); display: inline-flex; align-items: center; transition: all var(--duration-fast) var(--ease-out); }
  .view-toggle button svg { width: 0.875rem; height: 0.875rem; }
  .view-toggle button.is-active { background: var(--color-paper); color: var(--color-ink); box-shadow: var(--shadow-sm); }

  /* Results */
  .results { flex: 1 1 auto; overflow-y: auto; overscroll-behavior: contain; padding: var(--space-5); min-height: 0; }
  .results.is-list, .results.is-table { padding: 0; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(17.5rem, 1fr)); gap: var(--space-3); }
  .card { padding: var(--space-4); border: var(--hairline); border-radius: var(--radius-md); background: var(--color-paper); transition: all var(--duration-fast) var(--ease-out); cursor: pointer; display: flex; flex-direction: column; gap: var(--space-3); }
  .card:hover { border-color: var(--color-rule-2); transform: translateY(-0.0625rem); box-shadow: var(--shadow-sm); }
  .card.is-selected { border-color: var(--color-row-selected-rule); background: var(--color-row-selected); }
  .card-head { display: flex; justify-content: space-between; align-items: flex-start; gap: var(--space-3); }
  .card-name { font-family: var(--font-mono); font-size: var(--text-sm); font-weight: 500; color: var(--color-ink); word-break: break-word; min-width: 0; }
  .card-owner { color: var(--color-ink-3); }
  .card-stars { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--color-ink-3); display: inline-flex; align-items: center; gap: 0.1875rem; flex-shrink: 0; white-space: nowrap; }
  .card-desc { font-size: var(--text-sm); color: var(--color-ink-2); line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; flex: 1; }
  .card-foot { display: flex; flex-wrap: wrap; gap: var(--space-2); align-items: center; }
  .tag { font-family: var(--font-mono); font-size: 0.6875rem; padding: 0.125rem var(--space-2); background: var(--color-paper-3); color: var(--color-ink-2); border-radius: var(--radius-sm); white-space: nowrap; }
  .tag-lang { background: var(--color-accent-bg); color: var(--color-accent); }
  .activity { margin-left: auto; font-family: var(--font-mono); font-size: 0.6875rem; color: var(--color-ink-3); display: inline-flex; align-items: center; gap: 0.1875rem; }

  .nl-hint code { background: var(--color-paper); padding: 0.0625rem 0.3125rem; border-radius: 0.1875rem; }

  /* Discover specifics */
  .discover-banner { padding: var(--space-4) var(--space-5); background: var(--color-accent-bg); border-bottom: var(--hairline); font-size: var(--text-sm); color: var(--color-ink-2); display: flex; align-items: center; gap: var(--space-3); }

  .star-btn { background: transparent; border: 1px solid var(--color-rule-2); color: var(--color-ink-2); font-family: var(--font-mono); font-size: var(--text-xs); padding: 0.25rem var(--space-2); border-radius: var(--radius-sm); display: inline-flex; align-items: center; gap: 0.25rem; transition: all var(--duration-fast) var(--ease-out); }

// Persistence
function loadUI() {
  try {
    const raw = localStorage.getItem('stars.ui');
    if (!raw) return;
    const p = JSON.parse(raw);
    if (p.expanded) Object.assign(state.expanded, p.expanded);
    if (p.tableColumns) {
      const saved = p.tableColumns;
      const byKey = Object.fromEntries(state.tableColumns.map(c => [c.key, c]));
      const valid = saved.filter(s => byKey[s.key]).map(s => ({ ...byKey[s.key], width: s.width || byKey[s.key].width }));
      if (valid.length === state.tableColumns.length) state.tableColumns = valid;
    }
    if (p.theme) document.documentElement.setAttribute('data-theme', p.theme);
  } catch (e) {}
}
function saveUI() {
  try {
    const cs = window.getComputedStyle(document.documentElement);
    // Stored as rem (the restore appends 'rem'); parseFloat keeps the fractional part.
    const sidebarW = parseFloat(cs.getPropertyValue('--sidebar-w'));
    const detailW = parseFloat(cs.getPropertyValue('--detail-w'));
    const data = {
      sidebarW, detailW,
      expanded: state.expanded,
      tableColumns: state.tableColumns.map(c => ({ key: c.key, width: c.width }))
    };
    localStorage.setItem('stars.ui', JSON.stringify(data));
  } catch (e) {}
}

// ─── Activity + format helpers ──────────────────────────────
function activityTier(repo) {
  if (repo.pushed_days_ago == null) return { key: 'active', label: 'Active', cls: '' };
  if (repo.pushed_days_ago <= 7) return { key: 'active', label: 'Active', cls: '' };
  if (repo.pushed_days_ago <= 30) return { key: 'recent', label: 'Recent', cls: '' };
  if (repo.pushed_days_ago <= 90) return { key: 'warm', label: 'Warm', cls: 'is-warm' };
  return { key: 'cold', label: 'Stale', cls: 'is-cold' };
}
function activityLabel(repo) {
  const d = repo.pushed_days_ago;

// ─── Scoring (keyword / semantic / natural) ─────────────────
function keywordScore(repo, q) {

  let score = 0;
  for (const t of terms) {
    if (repo.name.toLowerCase().includes(t)) score += 10;
    if (repo.full_name.toLowerCase().includes(t)) score += 6;
    if (repo.description.toLowerCase().includes(t)) score += 3;
    if (repo.topics.some(tp => tp.includes(t))) score += 5;
    if (repo.language.toLowerCase() === t) score += 4;

const CLUSTERS = {
  terminal: ['tui', 'terminal', 'cli', 'shell', 'prompt', 'multiplexer', 'file-manager'],
  web: ['web', 'framework', 'frontend', 'css', 'ssg', 'router', 'http', 'edge', 'api', 'rpc', 'workers'],
  ai: ['ai', 'llm', 'ml', 'machine-learning', 'deep-learning', 'nlp', 'agents', 'inference', 'transformers', 'mcp', 'openai', 'embeddings'],
  data: ['data', 'database', 'sql', 'dataframe', 'olap', 'sqlite', 'arrow', 'search', 'search-engine', 'vector-database', 'vector'],
  build: ['build-tool', 'bundler', 'formatter', 'linter', 'esm', 'runtime', 'compiler', 'toolchain'],
  systems: ['async', 'io', 'networking', 'containers', 'orchestration', 'cloud-native', 'game-engine', 'graphics', 'ecs', 'systems'],
  components: ['components', 'react', 'design-system', 'design']
};
function repoClusters(repo) {

    if (c === 'terminal' && (ql.includes('command') || ql.includes('console'))) qc.add(c);
    if (c === 'web' && ql.includes('http')) qc.add(c);
    if (c === 'ai' && (ql.includes('language model') || ql.includes('intelligence'))) qc.add(c);

function parseNL(q) {

  for (const l of ['rust', 'typescript', 'go', 'python', 'c++', 'c']) {
    if (new RegExp(`\\b${l}\\b`, 'i').test(q)) r.languages.push(l === 'c++' ? 'C++' : l === 'c' ? 'C' : l[0].toUpperCase() + l.slice(1));
  }

  if (/\b(this week|past week|last week)\b/i.test(q)) r.maxAge = 7;
  if (/\b(this month|past month|last month)\b/i.test(q)) r.maxAge = 30;

// ─── Filter + rank ──────────────────────────────────────────
function applyFilters(repos) {

// ─── Facet counts ───────────────────────────────────────────
function facetCounts(facet) {
  const saved = state.filters[facet];
  state.filters[facet] = new Set();
  let base = applyFilters(STARS);
  state.filters[facet] = saved;
  if (state.query) {
    if (state.mode === 'natural') base = naturalFilter(base, state.query);
    else if (state.mode === 'keyword') base = base.filter(r => keywordScore(r, state.query) > 0);
    else if (state.mode === 'semantic') base = base.filter(r => semanticScore(r, state.query) >= 3);
  }
  const c = {};
  for (const r of base) {
    if (facet === 'language') c[r.language] = (c[r.language] || 0) + 1;
    else if (facet === 'topic') for (const t of r.topics) c[t] = (c[t] || 0) + 1;
    else if (facet === 'license') c[r.license] = (c[r.license] || 0) + 1;
    else if (facet === 'activity') { const k = activityTier(r).key; c[k] = (c[k] || 0) + 1; }

function neighbors(repo, k = 5) {

  return STARS.filter(r => r.full_name !== repo.full_name).map(r => {
    const sc = new Set(r.topics);

    const fkey = `cat:${key}`;
    return `<button class="tree-item ${isAct(fkey)}" data-discover-filter="${fkey}"><span class="tree-item-label">${escapeHtml(label)}</span><span class="tree-item-count">${count}</span></button>`;
  }).join('');

  const langs = [...new Set(DISCOVER.map(r => r.language))].sort();
  const langItems = langs.map(l => {
    const count = DISCOVER.filter(r => r.language === l).length;
    const fkey = `lang:${l}`;
    return `<button class="tree-item ${isAct(fkey)}" data-discover-filter="${fkey}"><span class="tree-item-label">${escapeHtml(l)}</span><span class="tree-item-count">${count}</span></button>`;
  }).join('');

  tree.innerHTML = `
    <div class="tree-node ${trendExpanded ? '' : 'is-collapsed'}" data-node="discover-trending">
      <div class="tree-node-header" data-toggle="discover-trending">
        ${caretSvg()}
        <span class="tree-node-label"><span class="tree-icon">${treeIcon('flame')}</span><span class="tree-name">Trending</span></span>
      </div>
      <div class="tree-children">${trendingItems}</div>
    </div>
    <div class="tree-node ${catExpanded ? '' : 'is-collapsed'}" data-node="discover-categories">
      <div class="tree-node-header" data-toggle="discover-categories">
        ${caretSvg()}
        <span class="tree-node-label"><span class="tree-icon">${treeIcon('folder')}</span><span class="tree-name">Categories</span></span>
      </div>
      <div class="tree-children">${cats}</div>
    </div>
    <div class="tree-node ${langExpanded ? '' : 'is-collapsed'}" data-node="discover-languages">
      <div class="tree-node-header" data-toggle="discover-languages">
        ${caretSvg()}
        <span class="tree-node-label"><span class="tree-icon">${treeIcon('lang')}</span><span class="tree-name">Languages</span></span>
      </div>
      <div class="tree-children">${langItems}</div>
    </div>
  `;
  attachTreeHandlers();
}

function attachTreeHandlers() {
  $$('.tree-node-header').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target.closest('.tree-node-action')) return;
      const k = el.dataset.toggle;
      if (!k) return;
      state.expanded[k] = !state.expanded[k];
      saveUI();
      renderTree();
    });
  });
  $$('[data-collection]').forEach(el => el.addEventListener('click', () => loadCollection(el.dataset.collection)));
  $$('[data-facet]').forEach(el => el.addEventListener('click', (e) => handleFacetClick(el.dataset.facet, el.dataset.facetKey, e)));
  $$('[data-discover-filter]').forEach(el => el.addEventListener('click', () => { state.discoverFilter = el.dataset.discoverFilter; render(); }));
  $('#new-collection')?.addEventListener('click', (e) => { e.stopPropagation(); $('#modal-backdrop').classList.add('is-open'); setTimeout(() => $('#collection-name-input').focus(), 50); });
  $('#clear-filters')?.addEventListener('click', (e) => { e.stopPropagation(); clearFilters(); });
}

function handleFacetClick(facet, key, e) {
  const buttons = $$(`[data-facet="${facet}"]`);
  const keys = buttons.map(b => b.dataset.facetKey);
  const set = state.filters[facet];
  if (e.shiftKey && state.selectionAnchor[facet] !== null) {
    const ai = keys.indexOf(state.selectionAnchor[facet]);
    const ki = keys.indexOf(key);
    if (ai >= 0 && ki >= 0) {
      const [lo, hi] = ai <= ki ? [ai, ki] : [ki, ai];
      set.clear();
      for (let i = lo; i <= hi; i++) set.add(keys[i]);
    }
  } else if (e.ctrlKey || e.metaKey) {
    if (set.has(key)) set.delete(key);
    else set.add(key);
    state.selectionAnchor[facet] = key;
  } else {
    if (set.size === 1 && set.has(key)) {
      set.clear();
      state.selectionAnchor[facet] = null;
    } else {
      set.clear();
      set.add(key);
      state.selectionAnchor[facet] = key;
    }
  }
  render();
}

function clearFilters() {
  state.filters = { language: new Set(), topic: new Set(), activity: new Set(), license: new Set() };
  state.selectionAnchor = { language: null, topic: null, activity: null, license: null };
  render();
}

// ─── Chips ───────────────────────────────────────────────────
function renderChips() {
  const chipsEl = $('#chips');
  if (!chipsEl) return;
  if (state.view === 'discover') {
    if (state.discoverFilter === 'all') { chipsEl.innerHTML = ''; return; }
    const labels = { 'trending-today': 'Trending today', 'trending-week': 'Trending this week', 'trending-month': 'Trending this month' };
    let label = labels[state.discoverFilter];
    if (state.discoverFilter.startsWith('cat:')) label = DISCOVER_CATEGORIES[state.discoverFilter.slice(4)];
    if (state.discoverFilter.startsWith('lang:')) label = state.discoverFilter.slice(5);
    chipsEl.innerHTML = `<span class="chip">${escapeHtml(label)}<button id="clear-discover-chip" aria-label="Clear"><svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 2l6 6M8 2l-6 6"/></svg></button></span>`;
    $('#clear-discover-chip')?.addEventListener('click', () => { state.discoverFilter = 'all'; render(); });
    return;
  }
  const chips = [];
  for (const [facet, set] of Object.entries(state.filters)) for (const v of set) chips.push({ facet, value: v });
  chipsEl.innerHTML = chips.map(c => `<span class="chip">${escapeHtml(c.value)}<button data-remove="${c.facet}|${escapeAttr(c.value)}" aria-label="Remove"><svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 2l6 6M8 2l-6 6"/></svg></button></span>`).join('');
  if (chips.length) {
    chipsEl.insertAdjacentHTML('beforeend', `<button class="chip-clear" id="chip-clear-all">Clear all</button>`);
    $('#chip-clear-all')?.addEventListener('click', clearFilters);
  }
  $$('.chip button[data-remove]').forEach(b => b.addEventListener('click', () => {
    const [facet, val] = b.dataset.remove.split('|');
    state.filters[facet].delete(val);
    if (state.selectionAnchor[facet] === val) state.selectionAnchor[facet] = null;
    render();
  }));
}

// ─── Results ─────────────────────────────────────────────────
function renderResults() {
  if (state.view === 'discover') return renderDiscoverResults();
  const filtered = applyFilters(STARS);
  const results = rankAndSort(filtered);
  $('#result-count') && ($('#result-count').textContent = results.length);
  $('#total-count') && ($('#total-count').textContent = STARS.length);

  const hintEl = $('#nl-hint');
  if (hintEl) {
    if (state.mode === 'natural' && state.query) {
      const p = parseNL(state.query);
      const parts = [];
      if (p.languages.length) parts.push(`<code>language: ${p.languages.join(', ')}</code>`);
      if (p.minStars) parts.push(`<code>stars >= ${formatStars(p.minStars)}</code>`);
      if (p.maxAge) parts.push(`<code>updated within ${p.maxAge}d</code>`);
      if (p.topics.length) parts.push(`<code>topic: ${[...new Set(p.topics)].slice(0, 4).join(', ')}</code>`);
      hintEl.innerHTML = parts.length ? `<strong>Interpreted query →</strong> ${parts.join(' · ')}` : `<strong>Interpreted query →</strong> falling back to text search`;
      hintEl.style.display = 'block';
    } else hintEl.style.display = 'none';
  }

  const el = $('#results');
  // In browse mode (item selected), force list view (single column)
  const effectiveView = state.selectedId ? 'list' : state.resultView;
  el.className = 'results is-' + effectiveView;

  if (results.length === 0) {
    el.innerHTML = `
      <div class="empty">
        <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="14" cy="14" r="9"/><path d="M22 22l6 6"/></svg>
        <h3>Nothing matches</h3>
        <p>Try widening the filters or switching search mode. Semantic mode often catches what keyword mode misses.</p>
        <button onclick="clearFilters()">Clear filters</button>
      </div>
    `;
    return;
  }

  if (effectiveView === 'grid') renderGrid(el, results);
  else if (effectiveView === 'list') renderList(el, results);
  else if (effectiveView === 'table') renderTable(el, results);
}

function renderDiscoverResults() {
  let results = DISCOVER.slice();
  const f = state.discoverFilter;
  if (f === 'trending-today') results = results.filter(r => r.trending === 'today');
  else if (f === 'trending-week') results = results.filter(r => r.trending === 'today' || r.trending === 'week');
  else if (f === 'trending-month') results = results.filter(r => r.trending);
  else if (f.startsWith('cat:')) results = results.filter(r => r.category === f.slice(4));
  else if (f.startsWith('lang:')) results = results.filter(r => r.language === f.slice(5));

  if (state.query) results = results.filter(r => keywordScore(r, state.query) > 0).map(r => ({ ...r, _score: keywordScore(r, state.query) }));

  const cmp = {
    stars: (a, b) => b.stars - a.stars,
    trending: (a, b) => { const w = { today: 3, week: 2, month: 1 }; return (w[b.trending] || 0) - (w[a.trending] || 0) || b.stars - a.stars; },
    name: (a, b) => a.full_name.localeCompare(b.full_name)
  }[state.sort] || ((a, b) => b.stars - a.stars);
  if (state.query) results.sort((a, b) => (b._score - a._score) || cmp(a, b));
  else results.sort(cmp);

  $('#result-count').textContent = results.length;
  const el = $('#results');
  const effectiveView = state.selectedId ? 'list' : state.resultView;
  el.className = 'results is-' + effectiveView;

  if (results.length === 0) {
    el.innerHTML = `<div class="empty"><svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="14" cy="14" r="9"/><path d="M22 22l6 6"/></svg><h3>No results</h3><p>Try a different category or clear the search.</p></div>`;
    return;
  }

  if (effectiveView === 'grid') el.innerHTML = `<div class="grid">${results.map(discoverCardHTML).join('')}</div>`;
  else el.innerHTML = `<div class="list">${results.map(discoverRowHTML).join('')}</div>`;
  attachCardHandlers();
  attachStarButtons();
}

// ─── Table column reorder + resize ──────────────────────────
function attachColumnHandlers() {
  let dragKey = null;
  $$('.table th[draggable="true"]').forEach(th => {
    th.addEventListener('dragstart', (e) => {
      dragKey = th.dataset.col;
      th.classList.add('is-dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', dragKey);
    });
    th.addEventListener('dragend', () => {
      th.classList.remove('is-dragging');
      $$('.table th').forEach(x => x.classList.remove('is-drop-before', 'is-drop-after'));
      dragKey = null;
    });
    th.addEventListener('dragover', (e) => {
      e.preventDefault();
      if (!dragKey || dragKey === th.dataset.col) return;
      const rect = th.getBoundingClientRect();
      const before = (e.clientX - rect.left) < rect.width / 2;
      $$('.table th').forEach(x => x.classList.remove('is-drop-before', 'is-drop-after'));
      th.classList.add(before ? 'is-drop-before' : 'is-drop-after');
    });
    th.addEventListener('drop', (e) => {
      e.preventDefault();
      if (!dragKey || dragKey === th.dataset.col) return;
      const rect = th.getBoundingClientRect();
      const before = (e.clientX - rect.left) < rect.width / 2;
      const from = state.tableColumns.findIndex(c => c.key === dragKey);
      let to = state.tableColumns.findIndex(c => c.key === th.dataset.col);
      if (from < 0 || to < 0) return;
      const [moved] = state.tableColumns.splice(from, 1);
      to = state.tableColumns.findIndex(c => c.key === th.dataset.col);
      if (!before) to += 1;
      state.tableColumns.splice(to, 0, moved);
      saveUI();
      renderResults();
    });
  });

  $$('.col-resize').forEach(h => {
    h.addEventListener('mousedown', (e) => {
      e.stopPropagation(); e.preventDefault();
      const key = h.dataset.resizeCol;
      const col = state.tableColumns.find(c => c.key === key);
      if (!col) return;
      const startX = e.clientX;
      const startW = col.width;
      h.classList.add('is-active');
      document.body.classList.add('is-resizing');
      const onMove = (ev) => {
        col.width = Math.max(60, Math.min(800, startW + (ev.clientX - startX)));
        const rootFont = parseFloat(getComputedStyle(document.documentElement).fontSize) || 16;
        const cols = $$('.table colgroup col');
        const idx = state.tableColumns.findIndex(c => c.key === key);
        if (cols[idx]) cols[idx].style.width = (col.width / rootFont) + 'rem';
        const total = state.tableColumns.reduce((s, c) => s + c.width, 0);
        const tbl = $('.table');
        if (tbl) tbl.style.width = (total / rootFont) + 'rem';
      };
      const onUp = () => {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        h.classList.remove('is-active');
        document.body.classList.remove('is-resizing');
        saveUI();
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  });
}

// ─── Mock file tree per repo ────────────────────────────────
function fileTreeFor(repo) {
  const lang = repo.language;
  const manifest = {
    Rust: [{ name: 'Cargo.toml', size: 920 }, { name: 'Cargo.lock', size: 48200 }],
    TypeScript: [{ name: 'package.json', size: 1840 }, { name: 'tsconfig.json', size: 620 }, { name: 'bun.lockb', size: 124000 }],
    JavaScript: [{ name: 'package.json', size: 1240 }, { name: '.eslintrc.json', size: 480 }],
    Go: [{ name: 'go.mod', size: 380 }, { name: 'go.sum', size: 14200 }],
    Python: [{ name: 'pyproject.toml', size: 1240 }, { name: 'requirements.txt', size: 320 }],
    'C++': [{ name: 'CMakeLists.txt', size: 2400 }],
    C: [{ name: 'Makefile', size: 1840 }, { name: 'configure', size: 8400 }],
    Zig: [{ name: 'build.zig', size: 1200 }],
    Lua: [{ name: 'init.lua', size: 1240 }]
  };
  const srcExt = { Rust: 'rs', TypeScript: 'ts', JavaScript: 'js', Go: 'go', Python: 'py', 'C++': 'cpp', C: 'c', Zig: 'zig', Lua: 'lua' };
  const ext = srcExt[lang] || 'js';

  const srcFiles = lang === 'Rust'
    ? [{ name: 'lib.rs', size: 4520 }, { name: 'main.rs', size: 840 }, { name: 'parser.rs', size: 3200 }]
    : lang === 'Go'
    ? [{ name: 'main.go', size: 4200 }, { name: `${repo.name}.go`, size: 6800 }, { name: 'config.go', size: 1840 }]
    : lang === 'Python'
    ? [{ name: '__init__.py', size: 240 }, { name: 'core.py', size: 5400 }, { name: 'utils.py', size: 1840 }]
    : [{ name: `index.${ext}`, size: 4520 }, { name: `types.${ext}`, size: 2840 }, { name: `core.${ext}`, size: 6200 }];

  return [
    { type: 'folder', name: '.github', children: [
      { type: 'folder', name: 'workflows', children: [
        { type: 'file', name: 'ci.yml', size: 1240 },
        { type: 'file', name: 'release.yml', size: 845 }
      ]},
      { type: 'file', name: 'ISSUE_TEMPLATE.md', size: 680 },
      { type: 'file', name: 'PULL_REQUEST_TEMPLATE.md', size: 420 }
    ]},
    { type: 'folder', name: 'docs', children: [
      { type: 'file', name: 'getting-started.md', size: 3200 },
      { type: 'file', name: 'api-reference.md', size: 12400 },
      { type: 'file', name: 'architecture.md', size: 8200 }
    ]},
    { type: 'folder', name: 'examples', children: [
      { type: 'file', name: `basic.${ext}`, size: 850 },
      { type: 'file', name: `advanced.${ext}`, size: 2350 }
    ]},
    { type: 'folder', name: 'src', children: srcFiles.map(f => ({ type: 'file', ...f })) },
    { type: 'folder', name: 'tests', children: [
      { type: 'file', name: `integration.${ext}`, size: 3400 },
      { type: 'file', name: `unit.${ext}`, size: 5200 }
    ]},
    { type: 'file', name: '.gitignore', size: 240 },
    { type: 'file', name: 'CHANGELOG.md', size: 5200 },
    { type: 'file', name: 'CONTRIBUTING.md', size: 2100 },
    { type: 'file', name: 'LICENSE', size: 1100 },
    { type: 'file', name: 'README.md', size: 8700 },
    ...(manifest[lang] || [{ name: 'package.json', size: 920 }]).map(m => ({ type: 'file', ...m }))
  ];
}

function fileTypeClass(name) {
  if (name.endsWith('.md')) return 'is-markdown';
  if (/\.(json|toml|yaml|yml|lock|lockb|mod|sum)$/.test(name) || name === 'Makefile' || name === 'CMakeLists.txt' || name === 'configure' || name === '.gitignore') return 'is-config';
  return '';
}

function fileIconSvg(name) {
  if (name.endsWith('.md')) return '<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M3 1.5h6l3 3v8a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1v-10a1 1 0 0 1 1-1z"/><path d="M9 1.5v3h3"/><path d="M4.5 10v-3l1.5 1.5L7.5 7v3M9 10V7M8.5 9l.5.5.5-.5"/></svg>';
  return '<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M3 1.5h6l3 3v8a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1v-10a1 1 0 0 1 1-1z"/><path d="M9 1.5v3h3"/></svg>';
}
function folderIconSvg(open) {
  return open
    ? '<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M1 4a1 1 0 0 1 1-1h3l1 1.5h6a1 1 0 0 1 1 1v0H1V4z"/><path d="M1 5.5h12l-1 6a1 1 0 0 1-1 .5H3a1 1 0 0 1-1-.5l-1-6z"/></svg>'
    : '<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M1 4a1 1 0 0 1 1-1h3l1 1.5h6a1 1 0 0 1 1 1v6a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V4z"/></svg>';
}

function formatSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1024 * 1024) return Math.round(b / 1024) + ' KB';
  return (b / 1024 / 1024).toFixed(1) + ' MB';
}

function initFileTreeState(nodes, path) {
  for (const n of nodes) {
    if (n.type === 'folder') {
      const id = path + '/' + n.name;
      if (state.fileTreeExpanded[id] === undefined) {
        // Default: top-level src expanded, dot-folders collapsed
        state.fileTreeExpanded[id] = !n.name.startsWith('.') && path === '';
      }
      initFileTreeState(n.children, id);
    }
  }
}

function renderFileTreeNodes(nodes, path) {
  return nodes.map(node => {
    if (node.type === 'folder') {
      const id = path + '/' + node.name;
      const expanded = state.fileTreeExpanded[id];
      return `
        <div class="file-row is-folder" data-folder="${escapeAttr(id)}">
          <span class="file-caret ${expanded ? '' : 'is-collapsed'}"><svg viewBox="0 0 8 8" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 3l3 3 3-3"/></svg></span>
          <span class="file-icon is-folder">${folderIconSvg(expanded)}</span>
          <span class="file-name">${escapeHtml(node.name)}</span>
        </div>
        ${expanded ? `<div class="file-children">${renderFileTreeNodes(node.children, id)}</div>` : ''}
      `;
    } else {
      return `
        <div class="file-row is-file" data-file="${escapeAttr(path + '/' + node.name)}">
          <span class="file-caret-spacer"></span>
          <span class="file-icon ${fileTypeClass(node.name)}">${fileIconSvg(node.name)}</span>
          <span class="file-name">${escapeHtml(node.name)}</span>
          <span class="file-size">${formatSize(node.size)}</span>
        </div>
      `;
    }
  }).join('');
}

function attachFileTreeHandlers(repo) {
  $$('.file-row.is-folder').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.folder;
      state.fileTreeExpanded[id] = !state.fileTreeExpanded[id];
      renderDetail();
    });
  });
  $$('.file-row.is-file').forEach(el => {
    el.addEventListener('click', () => {
      const name = el.dataset.file.split('/').pop();
      toast(`Would open ${name} (mock)`);
    });
  });
}

// ─── README generator ───────────────────────────────────────
function installCmd(repo) {
  const cmds = {
    Rust: `cargo add ${repo.name}`,
    TypeScript: `bun add ${repo.name}`,
    JavaScript: `npm install ${repo.name}`,
    Go: `go get github.com/${repo.full_name}@latest`,
    Python: `pip install ${repo.name}`,
    'C++': `# Add to CMakeLists.txt\nfind_package(${repo.name} REQUIRED)\ntarget_link_libraries(your_app PRIVATE ${repo.name}::${repo.name})`,
    C: `# Build from source\nmake && sudo make install`,
    Zig: `zig fetch --save https://github.com/${repo.full_name}/archive/main.tar.gz`,
    Lua: `# Via luarocks\nluarocks install ${repo.name}`
  };
  return cmds[repo.language] || `# See repository README for installation`;
}

function usageCode(repo) {
  const safe = repo.name.replace(/[-.]/g, '_');
  const samples = {
    Rust: `use ${safe}::*;\n\nfn main() {\n    // Your code here\n    let result = ${safe}::run();\n    println!("{:?}", result);\n}`,
    TypeScript: `import { ${safe} } from '${repo.name}';\n\nconst result = await ${safe}({\n  // options\n});\n\nconsole.log(result);`,
    JavaScript: `const ${safe} = require('${repo.name}');\n\nconst result = ${safe}({\n  // options\n});`,
    Go: `package main\n\nimport (\n    "fmt"\n    "github.com/${repo.full_name}"\n)\n\nfunc main() {\n    result := ${safe}.Run()\n    fmt.Println(result)\n}`,
    Python: `from ${repo.name.replace(/-/g, '_')} import core\n\nresult = core.run()\nprint(result)`,
    'C++': `#include <${repo.name}/${repo.name}.hpp>\n\nint main() {\n    ${safe}::Client client;\n    return client.run();\n}`,
    C: `#include "${repo.name}.h"\n\nint main(void) {\n    ${safe}_init();\n    return 0;\n}`,
    Zig: `const std = @import("std");\nconst ${safe} = @import("${repo.name}");\n\npub fn main() !void {\n    try ${safe}.run();\n}`,
    Lua: `local ${safe} = require('${repo.name}')\n\n${safe}.setup({})`
  };
  return samples[repo.language] || `// See repository README for usage`;
}

function generateReadme(repo) {
  const topicFeatures = repo.topics.slice(0, 4).map(t => `<li>Built-in support for <strong>${escapeHtml(t)}</strong></li>`);
  const extraFeatures = [
    '<li>Cross-platform compatibility</li>',
    '<li>Comprehensive documentation</li>',
    '<li>Active community and ongoing maintenance</li>'
  ];
  const features = [...topicFeatures, ...extraFeatures].slice(0, 6);
  const buildPass = repo.pushed_days_ago != null && repo.pushed_days_ago <= 14;
  const fresh = repo.pushed_days_ago != null && repo.pushed_days_ago <= 7;

  return `
    <h1>${escapeHtml(repo.name)}</h1>
    <div class="readme-badges">
      <span class="readme-badge is-accent">★ ${formatStars(repo.stars)}</span>
      <span class="readme-badge">${escapeHtml(repo.language)}</span>
      ${repo.license ? `<span class="readme-badge">${escapeHtml(repo.license)}</span>` : ''}
      ${buildPass ? '<span class="readme-badge is-good">build passing</span>' : ''}
      ${fresh ? '<span class="readme-badge is-good">actively maintained</span>' : ''}
    </div>
    <blockquote>${escapeHtml(repo.description)}</blockquote>

    <h2>Features</h2>
    <ul>${features.join('')}</ul>

    <h2>Installation</h2>
    <pre><code>${escapeHtml(installCmd(repo))}</code></pre>

    <h2>Usage</h2>
    <pre><code>${escapeHtml(usageCode(repo))}</code></pre>

    <h2>Documentation</h2>
    <p>Comprehensive documentation lives in the <code>docs/</code> folder. For the API reference, examples, and architectural notes, see <a href="https://github.com/${escapeAttr(repo.full_name)}#readme">the full README on GitHub</a>.</p>

    <h2>Contributing</h2>
    <p>Contributions are welcome. Please read <code>CONTRIBUTING.md</code> for the development workflow, code style conventions, and pull request process. We use the <code>.github/workflows/ci.yml</code> pipeline for automated testing.</p>

    <h2>License</h2>
    <p>This project is licensed under <strong>${escapeHtml(repo.license || 'MIT')}</strong>. See <code>LICENSE</code> for the full text.</p>
  `;
}

// ─── Detail / browser pane ──────────────────────────────────
function getRepo(id) { return STARS.find(r => r.full_name === id) || DISCOVER.find(r => r.full_name === id); }

function selectRepo(id) {
  if (state.selectedId === id) { closeDetail(); return; }
  if (!state.selectedId) {
    // First selection — remember view so we can restore
    state.previousResultView = state.resultView;
  }
  state.selectedId = id;
  $('#body').classList.add('has-detail');
  $('#detail').setAttribute('aria-hidden', 'false');
  // Init file tree expansion state for this repo
  const repo = getRepo(id);
  if (repo) initFileTreeState(fileTreeFor(repo), '');
  renderDetail();
  renderResults();
}

function closeDetail() {
  state.selectedId = null;
  if (state.previousResultView) {
    state.resultView = state.previousResultView;
    state.previousResultView = null;
  }
  $('#body').classList.remove('has-detail');
  $('#detail').setAttribute('aria-hidden', 'true');
  // Re-render scaffold so the view-toggle re-appears
  const main = $('#main');
  main.innerHTML = state.view === 'discover' ? mainScaffoldDiscover() : mainScaffoldStars();
  attachMainHandlers();
  renderChips();
  renderResults();
}

function renderDetail() {
  const r = getRepo(state.selectedId);
  if (!r) return closeDetail();
  const starred = state.starred.has(r.full_name);
  const tier = activityTier(r);
  const tree = fileTreeFor(r);

  $('#detail-content').innerHTML = `
    <div class="browser-header">
      <button class="detail-close" id="detail-close" aria-label="Close"><svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 3l8 8M11 3l-8 8"/></svg></button>
      <div class="detail-name"><span class="card-owner">${escapeHtml(r.owner)}/</span>${escapeHtml(r.name)}</div>
      <div class="detail-stats" style="margin-bottom: var(--space-4);">
        <span class="detail-stat">★ <strong>${formatStars(r.stars)}</strong></span>
        <span class="detail-stat">${escapeHtml(r.language)}</span>
        ${r.pushed_days_ago != null ? `<span class="detail-stat"><span class="activity ${tier.cls}" style="margin: 0; gap: 0.25rem;"><span class="activity-dot"></span>${tier.label}</span></span>` : ''}
        ${r.license ? `<span class="detail-stat">${escapeHtml(r.license)}</span>` : ''}
      </div>
      <p style="font-size: var(--text-sm); color: var(--color-ink-2); margin-bottom: var(--space-4); line-height: 1.55;">${escapeHtml(r.description)}</p>
      <div class="detail-actions" style="margin: 0;">
        <a class="btn btn-primary" href="https://github.com/${escapeAttr(r.full_name)}" target="_blank" rel="noopener">View on GitHub
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 6h6m0 0L6.5 3.5M9 6L6.5 8.5"/></svg>
        </a>
        <button class="btn ${starred ? 'is-starred' : 'btn-secondary'}" data-action="toggle-star">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="${starred ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="1.2"><path d="M6 1.5l1.4 3.3L11 5l-2.7 2 .8 3.4L6 8.7 2.9 10.4l.8-3.4L1 5l3.6-.2L6 1.5z"/></svg>
          ${starred ? 'Starred' : 'Star'}
        </button>
      </div>
    </div>

    <div class="browser-section">
      <div class="browser-section-head">
        <span>Files</span>
        <span class="browser-section-meta">main branch · ${tree.length} entries</span>
      </div>
      <div class="file-tree">${renderFileTreeNodes(tree, '')}</div>
    </div>

    <div class="browser-section">
      <div class="browser-section-head">
        <span>README<strong>.md</strong></span>
        <span class="browser-section-meta">8.7 KB</span>
      </div>
      <div class="readme">${generateReadme(r)}</div>
    </div>
  `;

  $('#detail-close').addEventListener('click', closeDetail);
  $('[data-action="toggle-star"]')?.addEventListener('click', () => {
    if (state.starred.has(r.full_name)) { state.starred.delete(r.full_name); toast(`Unstarred ${r.full_name}`); }
    else { state.starred.add(r.full_name); toast(`★ Starred ${r.full_name}`); }
    renderDetail();
    renderResults();
  });
  attachFileTreeHandlers(r);
}

// ─── Panel resize ───────────────────────────────────────────
function attachPanelResize(handleId, varName, invert) {
  const handle = $('#' + handleId);
  if (!handle) return;
  handle.addEventListener('mousedown', (e) => {
    e.preventDefault();
    // The layout tokens are in rem, but pointer movement is in px. Convert the rem token
    // widths to px for the duration of the drag (so the math tracks the cursor 1:1), then
    // write the result back as rem to keep the panels scaling with the user's font-size.
    const rootFont = parseFloat(getComputedStyle(document.documentElement).fontSize) || 16;
    const remToPx = (v) => parseFloat(v) * rootFont;
    const rs = getComputedStyle(document.documentElement);
    const startW = remToPx(rs.getPropertyValue(varName));
    const startX = e.clientX;
    handle.classList.add('is-active');
    document.body.classList.add('is-resizing');
    const onMove = (ev) => {
      const delta = invert ? (startX - ev.clientX) : (ev.clientX - startX);
      // No min/max bounds: a panel can be dragged to any size. The only floor is 0,
      // which just keeps the width non-negative so the grid track stays valid.
      const w = Math.max(0, startW + delta);
      document.documentElement.style.setProperty(varName, (w / rootFont) + 'rem');
    };
    const onUp = () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      handle.classList.remove('is-active');
      document.body.classList.remove('is-resizing');
      saveUI();
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
  handle.addEventListener('dblclick', () => {
    document.documentElement.style.removeProperty(varName);
    saveUI();
  });
}

// ─── Top-level render ───────────────────────────────────────
function render() {
  renderSidebarNav();
  renderTree();
  const main = $('#main');
  const isDiscover = state.view === 'discover';
  if (main.dataset.currentView !== state.view) {
    main.innerHTML = isDiscover ? mainScaffoldDiscover() : mainScaffoldStars();
    main.dataset.currentView = state.view;
    attachMainHandlers();
  }
  $('#mode-toggle').classList.toggle('is-hidden', isDiscover);
  const placeholders = isDiscover
    ? 'Search GitHub for new repos'
    : ({ keyword: 'Search starred repos by name, description, or topic', semantic: 'Describe what you are looking for — concepts, not just keywords', natural: 'Ask in plain English: "active Rust CLI tools" or "popular Python frameworks"' })[state.mode];
  $('#search').placeholder = placeholders;
  renderChips();
  renderResults();
  if (state.selectedId) renderDetail();
}

function attachMainHandlers() {
  $('#sort')?.addEventListener('change', (e) => { state.sort = e.target.value; renderResults(); });
  $$('[data-result-view]').forEach(b => {
    b.addEventListener('click', () => {
      $$('[data-result-view]').forEach(x => x.classList.remove('is-active'));
      b.classList.add('is-active');
      state.resultView = b.dataset.resultView;
      renderResults();
    });
  });
}

// ─── Event wiring ───────────────────────────────────────────
let searchDebounce;
function wireSearch() {
  const input = $('#search');
  input.addEventListener('input', (e) => {
    state.query = e.target.value;
    state.activeCollection = null;
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(() => { renderTree(); renderResults(); }, 120);
  });
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      e.target.value = ''; state.query = '';
      renderTree(); renderResults();
      e.target.blur();
    }
  });
}
function wireModes() {
  $$('.mode').forEach(b => {
    b.addEventListener('click', () => {
      $$('.mode').forEach(x => x.classList.remove('is-active'));
      b.classList.add('is-active');
      state.mode = b.dataset.mode;
      render();
    });
  });
}
function wireModal() {
  $('#modal-cancel').addEventListener('click', () => $('#modal-backdrop').classList.remove('is-open'));
  $('#modal-backdrop').addEventListener('click', (e) => { if (e.target === $('#modal-backdrop')) $('#modal-backdrop').classList.remove('is-open'); });
  $('#modal-save').addEventListener('click', () => {
    const name = $('#collection-name-input').value.trim();
    if (!name) return;
    saveCurrentAsCollection(name);
    $('#collection-name-input').value = '';
    $('#modal-backdrop').classList.remove('is-open');
  });
  $('#collection-name-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') $('#modal-save').click();
    if (e.key === 'Escape') $('#modal-backdrop').classList.remove('is-open');
  });
}
function wireTheme() {
  $('#theme-toggle').addEventListener('click', () => {
    const root = document.documentElement;
    const current = root.getAttribute('data-theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    const next = current === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', next);
    try { localStorage.setItem('theme', next); } catch (e) {}
  });
}
function wireSidebar() {
  $('#sidebar-toggle').addEventListener('click', () => {
    $('#sidebar').classList.toggle('is-open');
    $('#sidebar-backdrop').classList.toggle('is-open');
  });
  $('#sidebar-backdrop').addEventListener('click', () => {
    $('#sidebar').classList.remove('is-open');
    $('#sidebar-backdrop').classList.remove('is-open');
  });
}
function wireKeyboard() {
  document.addEventListener('keydown', (e) => {
    const isMac = navigator.platform.includes('Mac');
    const mod = isMac ? e.metaKey : e.ctrlKey;
    if (mod && e.key === 'k') { e.preventDefault(); $('#search').focus(); $('#search').select(); }
    if (e.key === '/' && document.activeElement.tagName !== 'INPUT') { e.preventDefault(); $('#search').focus(); }
    if (e.key === 'Escape' && state.selectedId && document.activeElement.tagName !== 'INPUT') closeDetail();
  });
  if (!navigator.platform.includes('Mac')) $('#search-kbd').textContent = 'Ctrl K';
}

// ─── Init ───────────────────────────────────────────────────
state.fileTreeExpanded = state.fileTreeExpanded || {};
loadUI();
loadCollections();
attachPanelResize('resize-sidebar', '--sidebar-w', false);
attachPanelResize('resize-detail', '--list-w', false);
wireSearch();
wireModes();
wireModal();
wireTheme();
wireSidebar();
wireKeyboard();
render();
</script>
